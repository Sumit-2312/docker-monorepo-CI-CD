name: Pushes the changes to docker hub on change of any file

on: 
  push: 
    branches: 
      - main 

jobs: 
    push-to-docker:
      runs-on: ubuntu-latest
      steps:
        - 
          name: checkout the code to vm 
          uses: actions/checkout@v4
        - 
          name: login to docker 
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        -
          name: Set up QEMU
          uses: docker/setup-qemu-action@v4
        -
          name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
        - 
          name: build and pushed the http-server image
          uses: docker/build-push-action@v7
          with:
            context: .
            file: "./docker/Dockerfile.httpServer"
            push: true # this tells after building the image also push to the docker hub repo
            tags: xodesumit/http-server:${{github.sha}}
